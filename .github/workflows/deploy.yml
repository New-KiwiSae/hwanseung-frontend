name: Frontend Deploy to GCP

on:
  push:
    branches: [ "main" ] # 본인의 기본 브랜치명 (master라면 master로 변경)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 내 깃허브 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. GCP 서버로 코드 전송하기 (frontend 폴더로)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          source: "."
          # 서버의 ~/hsproject/frontend 폴더에 소스 코드를 복사합니다.
          target: "~/hsproject/frontend"

      - name: 3. GCP 서버에 접속해서 프론트엔드 도커 실행하기
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd ~/hsproject
            # frontend 컨테이너만 다시 빌드해서 재실행합니다.
            docker-compose up -d --build